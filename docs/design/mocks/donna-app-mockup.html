<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donna</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   DONNA v3 — Command Surface with Soul
   Phantom Artifact — Warm dark, card-based, Raycast-level UX
   No activity bar. The palette IS the navigation.
   ═══════════════════════════════════════════════════════════════ */
:root {
  /* ── Warm Dark Palette ── */
  --bg-void: #0c0a10;
  --bg-deep: #0e0c12;
  --bg-window: rgba(14, 12, 19, 0.86);
  --bg-surface: rgba(21, 19, 28, 0.90);
  --bg-elevated: rgba(30, 27, 40, 0.88);
  --bg-input: rgba(16, 14, 22, 0.95);
  --bg-hover: rgba(40, 36, 54, 0.70);
  --bg-active: rgba(50, 46, 66, 0.75);
  --bg-panel: rgba(13, 11, 18, 0.94);
  --bg-donna-card: rgba(21, 19, 28, 0.55);
  --bg-proactive: rgba(32, 24, 18, 0.30);
  --bg-user-msg: rgba(124, 106, 255, 0.08);

  /* ── Borders ── */
  --border-subtle: rgba(255,255,255,0.04);
  --border-medium: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.11);
  --border-accent: rgba(124,106,255,0.22);

  /* ── Text — warm whites ── */
  --text-primary: #f0eef5;
  --text-secondary: #918f9e;
  --text-tertiary: #5e5c6a;
  --text-ghost: #3d3b47;
  --text-accent: #9584ff;
  --text-accent-bright: #b3a5ff;

  /* ── Accent — warmer violet ── */
  --accent: #7c6aff;
  --accent-bright: #9584ff;
  --accent-soft: rgba(124,106,255,0.10);
  --accent-glow: rgba(124,106,255,0.20);
  --accent-gradient: linear-gradient(135deg, #7c6aff 0%, #b794f6 100%);

  /* ── Warm accent for proactive ── */
  --warm: #d4a574;
  --warm-soft: rgba(212,165,116,0.10);
  --warm-dim: rgba(212,165,116,0.06);

  /* ── Status ── */
  --green: #4ade80; --green-dim: rgba(74,222,128,0.12);
  --amber: #fbbf24; --amber-dim: rgba(251,191,36,0.12);
  --red: #f87171;   --red-dim: rgba(248,113,113,0.10);
  --yellow: #facc15; --yellow-dim: rgba(250,204,21,0.10);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,0.12);

  /* ── Shadows — compound elevation ── */
  --shadow-window: 0 40px 80px -20px rgba(0,0,0,0.55), 0 16px 40px -10px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.05), 0 0 140px -30px rgba(124,106,255,0.05);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.03);
  --shadow-panel: -6px 0 30px -8px rgba(0,0,0,0.4);
  --shadow-notification: 0 24px 48px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  --shadow-menu: 0 12px 36px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.07);

  /* ── Motion ── */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0, 0, 0.2, 1);
  --speed-fast: 100ms;
  --speed-normal: 180ms;
  --speed-slow: 320ms;
  --speed-panel: 300ms;

  /* ── Radius ── */
  --r-window: 14px;
  --r-card: 10px;
  --r-pill: 20px;
  --r-input: 10px;

  /* ── Type ── */
  --f-xs: 10px; --f-sm: 11px; --f-base: 13px; --f-md: 14px; --f-lg: 15px; --f-xl: 18px; --f-2xl: 22px;
  --panel-w: 440px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: var(--f-base); color: var(--text-primary);
  background: var(--bg-void); overflow: hidden;
  -webkit-font-smoothing: antialiased; user-select: none;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(124,106,255,0.018) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 70%, rgba(212,165,116,0.010) 0%, transparent 50%),
    var(--bg-deep);
  z-index: 0;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

/* ══════════════════════════════
   KEYFRAMES — purposeful only
   ══════════════════════════════ */
@keyframes windowIn {
  0% { opacity: 0; transform: scale(0.96) translateY(6px); }
  70% { opacity: 1; transform: scale(1.005) translateY(-1px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes windowOut {
  to { opacity: 0; transform: scale(0.97) translateY(4px); }
}
@keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes backdropOut { from { opacity: 1; } to { opacity: 0; } }
@keyframes cardSlideIn {
  0% { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes cardSlideInLeft {
  0% { opacity: 0; transform: translateX(-6px); }
  100% { opacity: 1; transform: translateX(0); }
}
@keyframes dotBreath {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 currentColor; }
  50% { opacity: .7; box-shadow: 0 0 6px 2px currentColor; }
}
@keyframes ringPulse {
  0%, 100% { opacity: .35; transform: scale(1); }
  50% { opacity: .75; transform: scale(1.12); }
}
@keyframes ringThink {
  0% { transform: rotate(0deg); border-color: var(--accent); opacity: .8; }
  100% { transform: rotate(360deg); border-color: var(--accent-bright); opacity: .5; }
}
@keyframes typingWave {
  0%, 60%, 100% { transform: translateY(0); opacity: .35; }
  30% { transform: translateY(-4px); opacity: 1; }
}
@keyframes notifIn {
  0% { opacity: 0; transform: translateX(32px) scale(.97); }
  70% { transform: translateX(-3px) scale(1.005); }
  100% { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes notifOut {
  to { opacity: 0; transform: translateX(50px) scale(.96); }
}
@keyframes progressDrain { from { width: 100%; } to { width: 0%; } }
@keyframes panelSlideIn {
  0% { opacity: 0; transform: translateX(24px); }
  70% { opacity: 1; transform: translateX(-2px); }
  100% { transform: translateX(0); }
}
@keyframes panelSlideOut {
  to { opacity: 0; transform: translateX(24px); }
}
@keyframes itemReveal {
  0% { opacity: 0; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes sevPulse {
  0%, 100% { box-shadow: inset 3px 0 0 var(--red), 0 0 0 0 transparent; }
  50% { box-shadow: inset 3px 0 0 var(--red), 0 0 16px -4px rgba(248,113,113,0.12); }
}
@keyframes fillBar {
  from { width: 0%; } to { width: var(--pct); }
}
@keyframes burnDraw {
  from { stroke-dashoffset: 400; } to { stroke-dashoffset: 0; }
}
@keyframes scanLine {
  0% { left: -20%; } 100% { left: 120%; }
}
@keyframes menuIn {
  0% { opacity: 0; transform: scale(.96) translateY(3px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes suggestionIn {
  0% { opacity: 0; transform: translateY(-3px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes chipBounce {
  0% { transform: scale(1); } 50% { transform: scale(.97); } 100% { transform: scale(1); }
}
@keyframes borderShimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes badgeShake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-2px)} 40%{transform:translateX(2px)} 60%{transform:translateX(-1px)} 80%{transform:translateX(1px)}
}
@keyframes statusFade {
  0% { opacity: 0; transform: translateY(3px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════
   BACKDROP
   ══════════════════════════════ */
#backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  animation: backdropIn .3s var(--ease-smooth) forwards;
}
#backdrop.hiding { animation: backdropOut .22s var(--ease-smooth) forwards; pointer-events: none; }
#backdrop.hidden { display: none; }

/* ══════════════════════════════
   MAIN WINDOW — warm glass
   ══════════════════════════════ */
#donna-window {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 540px; max-height: 88vh;
  background: var(--bg-window);
  backdrop-filter: blur(48px) saturate(1.6); -webkit-backdrop-filter: blur(48px) saturate(1.6);
  border: 1px solid var(--border-medium);
  border-radius: var(--r-window);
  box-shadow: var(--shadow-window);
  z-index: 200;
  display: flex; flex-direction: row;
  overflow: hidden;
  animation: windowIn .42s var(--ease-spring) forwards;
  transition: width var(--speed-panel) var(--ease-smooth);
}
#donna-window.hiding { animation: windowOut .22s var(--ease-smooth) forwards; pointer-events: none; }
#donna-window.hidden { display: none; }
#donna-window.panel-open { width: 1000px; }
#donna-window::before {
  content: ''; position: absolute; inset: -1px;
  border-radius: calc(var(--r-window) + 1px);
  background: linear-gradient(135deg, rgba(124,106,255,0.12), transparent 25%, transparent 75%, rgba(124,106,255,0.06));
  background-size: 200% 200%;
  animation: borderShimmer 10s ease infinite;
  z-index: -1; pointer-events: none;
}

/* ── Main Column ── */
#main-col {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: flex var(--speed-panel) var(--ease-smooth);
}

/* ═══════ TITLE BAR ═══════ */
#title-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 20px 4px;
  /* Frosted glass title bar */
  background: rgba(14,12,19,0.3);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  flex-shrink: 0; cursor: default;
}
.donna-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent-gradient);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 12px; color: #fff;
  position: relative; flex-shrink: 0;
  letter-spacing: -0.5px;
}
.donna-avatar::after {
  content: ''; position: absolute; inset: -4px;
  border-radius: 50%; border: 1.5px solid rgba(124,106,255,0.3);
  animation: ringPulse 4s ease-in-out infinite;
  pointer-events: none;
}
.donna-avatar.thinking::after {
  border-style: dashed; border-width: 1.5px;
  border-color: var(--accent-bright) transparent var(--accent) transparent;
  animation: ringThink 1.2s linear infinite;
}
.title-status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); color: var(--green);
  animation: dotBreath 3s ease-in-out infinite;
}
#title-text {
  font-size: var(--f-lg); font-weight: 700; color: var(--text-primary);
  letter-spacing: -0.03em; flex: 1;
}
.title-btn {
  width: 26px; height: 26px; border-radius: 6px; border: none;
  background: transparent; color: var(--text-ghost); font-size: 13px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all var(--speed-fast); line-height: 1;
}
.title-btn:hover { background: var(--bg-hover); color: var(--text-tertiary); }
.title-btn.close:hover { color: var(--red); background: var(--red-dim); }

/* ═══════ COMMAND INPUT — Spotlight-style ═══════ */
#input-area { padding: 10px 20px 0; flex-shrink: 0; position: relative; }
#cmd-input-wrap {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-input);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-input); padding: 0 16px;
  transition: all var(--speed-normal) var(--ease-smooth);
}
#cmd-input-wrap:focus-within {
  border-color: var(--border-accent);
  box-shadow: 0 0 0 3px rgba(124,106,255,0.06), 0 0 20px -6px rgba(124,106,255,0.10);
}
.input-icon { color: var(--text-ghost); font-size: 15px; flex-shrink: 0; transition: color var(--speed-fast); }
#cmd-input-wrap:focus-within .input-icon { color: var(--accent); }
#cmd-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text-primary); font-family: 'Inter', sans-serif;
  font-size: 16px; font-weight: 400; padding: 13px 0;
  caret-color: var(--accent); letter-spacing: -0.01em;
}
#cmd-input::placeholder { color: var(--text-ghost); font-weight: 300; letter-spacing: 0; }
.input-shortcut {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  color: var(--text-ghost); background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: 4px; padding: 2px 6px; flex-shrink: 0;
}

/* ═══════ SUGGESTION LIST — Raycast-style ═══════ */
#suggestions-panel {
  padding: 6px 0; flex-shrink: 0;
  max-height: 280px; overflow-y: auto;
  display: none;
}
#suggestions-panel.visible { display: block; }
.sg-group-label {
  font-size: var(--f-xs); font-weight: 600; color: var(--text-ghost);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 10px 20px 4px;
}
.sg-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px; cursor: pointer; border-radius: 0;
  transition: background var(--speed-fast);
  animation: suggestionIn .18s var(--ease-out) both;
  position: relative;
}
.sg-item.selected { background: var(--bg-hover); }
.sg-item.selected::before {
  content: ''; position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 16px; border-radius: 2px; background: var(--accent);
}
.sg-item:hover { background: var(--bg-hover); }
.sg-icon {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--bg-elevated); border: 1px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--text-secondary); flex-shrink: 0;
}
.sg-icon.accent { background: var(--accent-soft); color: var(--accent-bright); border-color: var(--border-accent); }
.sg-text { flex: 1; min-width: 0; }
.sg-title { font-size: var(--f-md); font-weight: 500; color: var(--text-primary); line-height: 1.3; }
.sg-sub { font-size: var(--f-sm); color: var(--text-tertiary); margin-top: 1px; }
.sg-right { font-family: 'JetBrains Mono', monospace; font-size: var(--f-xs); color: var(--text-ghost); flex-shrink: 0; }
.sg-divider { height: 1px; background: var(--border-subtle); margin: 4px 20px; }

/* ═══════ CHAT FLOW — Donna cards ═══════ */
#chat-flow {
  flex: 1; overflow-y: auto; padding: 4px 0;
  display: none; flex-direction: column; gap: 4px;
  min-height: 0; scroll-behavior: smooth;
}
#chat-flow.visible { display: flex; }

/* User messages — minimal */
.msg-user {
  padding: 6px 20px; animation: cardSlideIn .25s var(--ease-out) both;
  display: flex; justify-content: flex-end;
}
.msg-user-bubble {
  background: var(--bg-user-msg); border: 1px solid rgba(124,106,255,0.06);
  border-radius: 10px 10px 3px 10px;
  padding: 9px 14px; font-size: var(--f-md); color: var(--text-primary);
  max-width: 80%; line-height: 1.5;
}

/* Donna cards — chief of staff style */
.donna-card {
  padding: 4px 16px 4px 20px;
  animation: cardSlideInLeft .3s var(--ease-out) both;
}
.donna-card-inner {
  display: flex; border-radius: 2px 10px 10px 2px; overflow: hidden;
  background: var(--bg-donna-card);
  border: 1px solid var(--border-subtle);
  border-left: none;
  transition: all var(--speed-normal);
}
.donna-card-inner:hover { border-color: var(--border-medium); }
.donna-card-accent {
  width: 3px; flex-shrink: 0;
  background: var(--accent);
}
.donna-card-body {
  padding: 12px 16px; flex: 1;
  font-size: var(--f-md); line-height: 1.6; color: var(--text-primary);
  letter-spacing: -0.01em;
}
.donna-card-body strong { color: var(--text-primary); font-weight: 600; }
.donna-card-body code {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  background: var(--accent-soft); border-radius: 3px; padding: 1px 5px;
  color: var(--text-accent);
}
.donna-card-body .dim { color: var(--text-secondary); }
.donna-card-body .ok { color: var(--green); font-weight: 600; }
.donna-card-body .warn { color: var(--amber); font-weight: 600; }
.donna-card-time {
  font-size: var(--f-xs); color: var(--text-ghost); padding: 2px 0 0 20px;
  font-family: 'JetBrains Mono', monospace;
}

/* Proactive — warmer tint */
.donna-card.proactive .donna-card-accent { background: var(--warm); }
.donna-card.proactive .donna-card-inner {
  background: var(--bg-proactive); border-color: rgba(212,165,116,0.08);
}

/* Typing indicator */
.typing-wrap { padding: 6px 20px; }
.typing-card {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--bg-donna-card); border: 1px solid var(--border-subtle);
  border-radius: 2px 10px 10px 2px; padding: 12px 16px;
  border-left: 3px solid var(--accent);
}
.t-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--text-tertiary);
  animation: typingWave 1.4s ease-in-out infinite;
}
.t-dot:nth-child(2) { animation-delay: .18s; }
.t-dot:nth-child(3) { animation-delay: .36s; }

/* ═══════ STATUS BAR ═══════ */
#status-bar {
  padding: 9px 20px; border-top: 1px solid var(--border-subtle);
  flex-shrink: 0; position: relative; overflow: hidden;
}
#status-text {
  font-size: var(--f-sm); color: var(--text-ghost);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: -0.02em;
  animation: statusFade .4s var(--ease-out);
}
/* Scanning line animation */
#status-bar::after {
  content: ''; position: absolute; top: 0; left: -20%;
  width: 20%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
  animation: scanLine 4s ease-in-out infinite;
}

/* ══════════════════════════════
   PANEL CONTAINER
   ══════════════════════════════ */
#panel-container {
  width: 0; overflow: hidden; flex-shrink: 0;
  border-left: 1px solid transparent;
  transition: width var(--speed-panel) var(--ease-smooth), border-color var(--speed-panel);
  display: flex; flex-direction: column;
  background: var(--bg-panel);
}
#panel-container.open {
  width: var(--panel-w); border-left-color: var(--border-subtle);
}
/* ── Panel tabs — minimal text ── */
#panel-tabs {
  display: none; padding: 12px 18px 0;
  gap: 16px; align-items: center; flex-shrink: 0;
}
#panel-container.open #panel-tabs { display: flex; }
.ptab {
  font-size: var(--f-sm); font-weight: 600; color: var(--text-ghost);
  cursor: pointer; padding: 4px 0; border-bottom: 2px solid transparent;
  transition: all var(--speed-fast);
  letter-spacing: -0.01em;
}
.ptab:hover { color: var(--text-secondary); }
.ptab.active { color: var(--text-primary); border-bottom-color: var(--accent); }
.ptab-close {
  margin-left: auto; width: 22px; height: 22px; border-radius: 5px; border: none;
  background: transparent; color: var(--text-ghost); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; transition: all var(--speed-fast);
}
.ptab-close:hover { background: var(--bg-hover); color: var(--text-secondary); }

/* ── Panel content ── */
.panel { display: none; flex-direction: column; flex: 1; min-height: 0; min-width: var(--panel-w); }
.panel.active { display: flex; animation: panelSlideIn .3s var(--ease-spring) both; }
.panel-header {
  padding: 14px 18px 10px;
  display: flex; align-items: baseline; gap: 8px; flex-shrink: 0;
}
.panel-title {
  font-size: var(--f-xl); font-weight: 800; color: var(--text-primary);
  letter-spacing: -0.04em;
}
.panel-subtitle { font-size: var(--f-sm); color: var(--text-tertiary); font-weight: 500; }
.panel-body { flex: 1; overflow-y: auto; padding: 0 18px 18px; }
.panel-section-label {
  font-size: var(--f-xs); font-weight: 700; color: var(--text-ghost);
  text-transform: uppercase; letter-spacing: .1em;
  padding: 14px 0 6px;
}

/* ═══════ INCIDENTS ═══════ */
.inc-item {
  border-radius: var(--r-card); border: 1px solid var(--border-subtle);
  margin-bottom: 8px; cursor: pointer; overflow: hidden;
  transition: all var(--speed-fast) var(--ease-smooth);
  animation: itemReveal .3s var(--ease-out) both;
}
.inc-item:hover { border-color: var(--border-medium); }
.inc-item.expanded { border-color: var(--border-accent); }
/* Severity left border */
.inc-item.sev1 { border-left: 3px solid var(--red); }
.inc-item.sev1:not(.mitigated) { animation: sevPulse 3s ease-in-out infinite, itemReveal .3s var(--ease-out) both; }
.inc-item.sev2 { border-left: 3px solid var(--orange); }

/* ══════════════════════════════
   SUGGESTIONS — Raycast-style
   ══════════════════════════════ */
let allItems=[];
function buildSuggestions(q){
  const lq=q.toLowerCase().trim();
  let html='';
  allItems=[];
  if(!lq){
    CMDS.forEach(g=>{
      html+=`<div class="sg-group-label">${g.cat}</div>`;
      g.items.forEach((it,i)=>{
        const idx=allItems.length;
        html+=sgHtml(it,idx);
        allItems.push(it);
      });
    });
  } else {
    const flat=CMDS.flatMap(g=>g.items);
    const m=flat.filter(it=>it.t.toLowerCase().includes(lq)||it.s.toLowerCase().includes(lq)||(it.action&&it.action.includes(lq)));
    if(m.length){
      html+=`<div class="sg-group-label">SUGGESTIONS</div>`;
      m.slice(0,6).forEach(it=>{const idx=allItems.length;html+=sgHtml(it,idx);allItems.push(it);});
    }
    // Always add "Ask Donna"
    const ask={icon:'\u25C9',t:'Ask Donna: "'+esc(q)+'"',s:'AI-powered response',action:null,k:'Enter',accent:true};
    html+=`<div class="sg-divider"></div>`;
    const idx=allItems.length; html+=sgHtml(ask,idx); allItems.push(ask);
  }
  sgPanel.innerHTML=html;
  sgPanel.classList.add('visible');
  S.sgIdx=-1;
  $$('.sg-item',sgPanel).forEach((el,i)=>{
    el.addEventListener('click',()=>selectSg(i));
    el.addEventListener('mouseenter',()=>highlightSg(i));
  });
}
function sgHtml(it,idx){
  return `<div class="sg-item${it.dim?' dim':''}" data-idx="${idx}" style="animation-delay:${idx*.025}s">
    <div class="sg-icon${it.accent?' accent':''}">${it.icon}</div>
    <div class="sg-text"><div class="sg-title">${it.t}</div>${it.s?'<div class="sg-sub">'+it.s+'</div>':''}</div>
    ${it.k?'<div class="sg-right">'+it.k+'</div>':''}
  </div>`;
}
function highlightSg(i){
  $$('.sg-item',sgPanel).forEach((el,j)=>el.classList.toggle('selected',j===i));
  S.sgIdx=i;
}
function selectSg(i){
  const it=allItems[i]; if(!it)return;
  sgPanel.classList.remove('visible');
  input.value='';
  if(it.action&&DONNA[it.action]) execAction(it.action);
  else if(it.action&&PANEL_KEYS[it.action]) openPanel(PANEL_KEYS[it.action]);
  else sendUser(input.value.trim()||it.t.replace(/^Ask Donna: "/,'').replace(/"$/,'')||'help');
}

input.addEventListener('input',()=>{buildSuggestions(input.value);resetIdle();});
input.addEventListener('focus',()=>{if(!sgPanel.classList.contains('visible'))buildSuggestions(input.value);});
input.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();highlightSg(Math.min(S.sgIdx+1,allItems.length-1));scrollSgIntoView();}
  if(e.key==='ArrowUp'){e.preventDefault();highlightSg(Math.max(S.sgIdx-1,0));scrollSgIntoView();}
  if(e.key==='Enter'){
    e.preventDefault();
    if(S.sgIdx>=0&&sgPanel.classList.contains('visible')){selectSg(S.sgIdx);return;}
    const v=input.value.trim();if(!v)return;
    sgPanel.classList.remove('visible');input.value='';
    const pk=Object.keys(PANEL_KEYS).find(k=>v.toLowerCase().includes(k));
    if(pk){sendUser(v,()=>openPanel(PANEL_KEYS[pk]));return;}
    const ak=Object.keys(DONNA).find(k=>v.toLowerCase().includes(k));
    if(ak){execAction(ak);return;}
    sendUser(v);
  }
  if(e.key==='Escape'){
    if(sgPanel.classList.contains('visible')){sgPanel.classList.remove('visible');return;}
    if(S.panel){closePanel();return;}
    hide();
  }
});
function scrollSgIntoView(){const el=$('.sg-item.selected',sgPanel);if(el)el.scrollIntoView({block:'nearest'});}
document.addEventListener('click',e=>{if(!e.target.closest('#input-area')&&!e.target.closest('#suggestions-panel'))sgPanel.classList.remove('visible');});

function enterChat(){if(!S.chat){S.chat=true;chatFlow.classList.add('visible');}}
function addUser(text){
  enterChat();
  const el=document.createElement('div');el.className='msg-user';
  el.innerHTML=`<div class="msg-user-bubble">${esc(text)}</div>`;
  el.style.animation=`cardSlideIn .25s var(--ease-out) both`;

}
function addDonna(html,proactive){
  enterChat();
  const el=document.createElement('div');el.className='donna-card'+(proactive?' proactive':'');
  el.innerHTML=`<div class="donna-card-inner"><div class="donna-card-accent"></div><div class="donna-card-body">${html}</div></div>`;
  el.style.animation=`cardSlideInLeft .3s var(--ease-out) both`;
  chatFlow.appendChild(el);scrollChat();
}
function showTyping(){
  enterChat();donnaAvi.classList.add('thinking');
  const el=document.createElement('div');el.className='typing-wrap';el.id='typing-ind';
  el.innerHTML=`<div class="typing-card"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  chatFlow.appendChild(el);scrollChat();
}
function hideTyping(){const t=$('#typing-ind');if(t)t.remove();donnaAvi.classList.remove('thinking');}
function scrollChat(){requestAnimationFrame(()=>{chatFlow.scrollTop=chatFlow.scrollHeight;});}

function sendUser(text,after){
  addUser(text);showTyping();
  setTimeout(()=>{
    hideTyping();
    const l=text.toLowerCase().trim();
    let r=FREEFORM_MATCH[l];
    if(!r){const k=Object.keys(FREEFORM_MATCH).find(k=>l.includes(k));r=k?FREEFORM_MATCH[k]:null;}
    if(!r)r=FREEFORM[Math.floor(Math.random()*FREEFORM.length)];
    addDonna(r);resetIdle();
    if(after)setTimeout(after,300);
  },600+Math.random()*700);
}
function execAction(key){
  const d=DONNA[key];if(!d)return;
  addUser(d.u);showTyping();
  setTimeout(()=>{
    hideTyping();addDonna(d.d);
    if(d.panel)setTimeout(()=>openPanel(d.panel),350);
    if(d.follow)setTimeout(()=>{addUser(d.follow.u);showTyping();setTimeout(()=>{hideTyping();addDonna(d.follow.d);},450+Math.random()*300);},1800);
    resetIdle();
  },650+Math.random()*500);
}

function openPanel(name){
  if(S.panel===name){closePanel();return;}
  if(name==='incidents')renderInc(); if(name==='prs')renderPRs(); if(name==='sprint')renderSprint();
  $$('.panel').forEach(p=>p.classList.remove('active'));
  const p=$(`#panel-${name}`);if(!p)return;
  p.classList.add('active');reAnim(p,'panelSlideIn .3s var(--ease-spring) both');
  panelCont.classList.add('open');win.classList.add('panel-open');
  S.panel=name;
  $$('.ptab').forEach(t=>t.classList.toggle('active',t.dataset.panel===name));
}
function closePanel(){
  if(!S.panel)return;
  const p=$(`#panel-${S.panel}`);
  if(p){p.style.animation='panelSlideOut .2s var(--ease-smooth) forwards';setTimeout(()=>{p.classList.remove('active');p.style.animation='';},220);}
  panelCont.classList.remove('open');win.classList.remove('panel-open');S.panel=null;
  $$('.ptab').forEach(t=>t.classList.remove('active'));
}

$$('.ptab').forEach(t=>{t.addEventListener('click',()=>openPanel(t.dataset.panel));});
